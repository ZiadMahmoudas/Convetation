<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مكتبة المعلمين — الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
  /* ── Forgot Password ── */
.label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 7px;
}
.label-row label {
  margin-bottom: 0 !important; /* لتوحيد المسافات مع التصميم الأصلي */
}
.forgot-link {
  font-size: 11px;
  color: var(--gold);
  text-decoration: none;
  font-weight: 700;
  transition: all 0.2s ease;
}
.forgot-link:hover {
  color: var(--gold2);
  text-decoration: underline;
}
:root {
  --ink:    #0D1117;
  --ink2:   #111922;
  --ink3:   #162030;
  --gold:   #D4A843;
  --gold2:  #ECC96A;
  --gold3:  #F5E09A;
  --ivory:  #F7F2E8;
  --ivory2: #EDE6D6;
  --rose:   #C0705A;
  --teal:   #2A8A7E;
  --muted:  rgba(247,242,232,.45);
  --border: rgba(212,168,67,.18);
  --border2:rgba(212,168,67,.35);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:"Tajawal",sans-serif;
  background:var(--ink);
  color:var(--ivory);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* ── Animated BG ── */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(212,168,67,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(42,138,126,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(192,112,90,.04) 0%, transparent 60%),
    var(--ink);
}

/* Floating orbs */
.orb{
  position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;
  animation:orb-float 12s ease-in-out infinite;
}
.orb1{width:400px;height:400px;background:rgba(212,168,67,.06);top:-10%;right:-5%;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(42,138,126,.05);bottom:5%;left:-5%;animation-delay:-4s}
.orb3{width:200px;height:200px;background:rgba(192,112,90,.04);bottom:30%;right:10%;animation-delay:-8s}
@keyframes orb-float{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(20px,-30px) scale(1.05)}
  66%{transform:translate(-15px,20px) scale(.96)}
}

/* Gold line divider */
.gold-line{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
  z-index:100;
}

/* ── Main Card ── */
.auth-card{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  margin:20px;
  background:var(--ink2);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(212,168,67,.05),
    0 30px 80px rgba(0,0,0,.5),
    0 0 60px rgba(212,168,67,.04);
}

/* Header ornament */
.auth-header{
  padding:32px 32px 24px;
  text-align:center;
  position:relative;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(212,168,67,.05) 0%, transparent 100%);
}
.auth-logo{
  width:56px;height:56px;
  border-radius:16px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;
  margin-bottom:14px;
  box-shadow:0 8px 24px rgba(212,168,67,.3);
}
.auth-title{
  font-family:"Amiri",serif;
  font-size:28px;font-weight:700;
  color:var(--gold2);
  letter-spacing:.5px;
  margin-bottom:6px;
}
.auth-subtitle{
  font-size:13px;color:rgba(247,242,232,.5);
  font-weight:400;
}

/* ── Tabs ── */
.auth-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
}
.auth-tab{
  flex:1;padding:14px;
  text-align:center;
  font-size:14px;font-weight:700;
  cursor:pointer;
  color:rgba(247,242,232,.35);
  background:transparent;border:none;
  font-family:"Tajawal",sans-serif;
  position:relative;
  transition:all .2s ease;
}
.auth-tab::after{
  content:"";position:absolute;
  bottom:0;left:20%;right:20%;
  height:2px;
  background:linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius:2px 2px 0 0;
  transform:scaleX(0);
  transition:transform .25s ease;
}
.auth-tab.on{color:var(--gold2)}
.auth-tab.on::after{transform:scaleX(1)}
.auth-tab:hover:not(.on){color:rgba(247,242,232,.6)}

/* ── Forms ── */
.auth-body{padding:28px 32px 32px}

.form-panel{display:none}
.form-panel.on{display:block}

.field{margin-bottom:18px}
.field label{
  display:block;
  font-size:11px;font-weight:800;
  color:rgba(212,168,67,.7);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;
}
.field-wrap{position:relative}
.field-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:rgba(247,242,232,.25);font-size:14px;pointer-events:none;
}
.field input{
  width:100%;
  padding:12px 40px 12px 14px;
  background:var(--ink3);
  border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--ivory);
  font-family:"Tajawal",sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color .2s, box-shadow .2s;
  direction:rtl;
}
.field input::placeholder{color:rgba(247,242,232,.2)}
.field input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(212,168,67,.12);
}
.field input.err{border-color:var(--rose);box-shadow:0 0 0 3px rgba(192,112,90,.12)}

.field-err{
  font-size:11px;color:var(--rose);
  margin-top:5px;display:none;
}
.field-err.vis{display:block}

/* ── Submit Btn ── */
.btn-auth{
  width:100%;padding:14px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:var(--ink);
  font-family:"Tajawal",sans-serif;
  font-size:15px;font-weight:800;
  border:none;border-radius:10px;
  cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:0 6px 24px rgba(212,168,67,.25);
  transition:all .2s ease;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:4px;
}
.btn-auth::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.2) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-auth:hover::before{transform:translateX(100%)}
.btn-auth:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(212,168,67,.35)}
.btn-auth:active{transform:translateY(0)}
.btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Guest CTA ── */
.guest-cta{
  margin-top:20px;
  padding:14px;
  background:rgba(212,168,67,.05);
  border:1px dashed var(--border);
  border-radius:10px;
  text-align:center;
}
.guest-cta p{font-size:12px;color:rgba(247,242,232,.4);margin-bottom:8px}
.guest-cta strong{color:var(--gold2)}
.btn-guest{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 20px;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:8px;
  color:rgba(247,242,232,.6);
  font-family:"Tajawal",sans-serif;
  font-size:13px;font-weight:700;
  cursor:pointer;
  transition:all .18s ease;
  text-decoration:none;
}
.btn-guest:hover{
  background:rgba(212,168,67,.08);
  border-color:var(--gold);
  color:var(--ivory);
}

/* ── Password toggle ── */
.toggle-pass{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(247,242,232,.3);
  cursor:pointer;font-size:14px;padding:4px;
  transition:color .15s;
}
.toggle-pass:hover{color:var(--gold)}

/* ── Divider ── */
.or-divider{
  display:flex;align-items:center;gap:12px;
  margin:18px 0;
  font-size:11px;color:rgba(247,242,232,.2);
  font-weight:600;letter-spacing:.5px;
}
.or-divider::before,.or-divider::after{
  content:"";flex:1;
  height:1px;background:var(--border);
}

/* ── Toast ── */
#toast{
  position:fixed;
  bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink2);
  color:var(--ivory);
  padding:12px 24px;
  border-radius:10px;
  border:1px solid var(--border);
  border-right:3px solid var(--gold);
  font-size:13px;font-weight:700;
  z-index:9999;
  opacity:0;
  transition:all .25s ease;
  white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-right-color:var(--rose)}
#toast.ok{border-right-color:var(--teal)}

/* Spinner */
.spin{
  display:inline-block;
  width:16px;height:16px;
  border:2px solid rgba(13,17,23,.3);
  border-top-color:var(--ink);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Ornament corners ── */
.corner{
  position:absolute;
  width:30px;height:30px;
  border-color:rgba(212,168,67,.2);
  border-style:solid;
}
.corner-tl{top:12px;right:12px;border-width:1.5px 0 0 1.5px}
.corner-br{bottom:12px;left:12px;border-width:0 1.5px 1.5px 0}

/* Password strength */
.pw-strength{
  display:flex;gap:4px;margin-top:6px;
}
.pw-bar{
  flex:1;height:3px;border-radius:2px;
  background:rgba(247,242,232,.1);
  transition:background .3s;
}
.pw-bar.weak{background:var(--rose)}
.pw-bar.med{background:var(--gold)}
.pw-bar.str{background:var(--teal)}

</style>
</head>
<body>
<div class="gold-line"></div>
<div class="bg-layer"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="auth-card">
  <div class="auth-header">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>
    <div class="auth-logo">✦</div>
    <div class="auth-title">مكتبة المعلمين</div>
    <div class="auth-subtitle">منصة التهاني الإبداعية</div>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab on" id="tab-login" onclick="switchTab('login')">
      <i class="fa-solid fa-right-to-bracket" style="margin-left:6px;font-size:13px"></i>تسجيل الدخول
    </button>
    <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">
      <i class="fa-solid fa-user-plus" style="margin-left:6px;font-size:13px"></i>إنشاء حساب
    </button>
  </div>

  <div class="auth-body">

    <!-- ══ LOGIN FORM ══ -->
    <div class="form-panel on" id="panel-login">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="field-wrap">
          <i class="fa-regular fa-envelope field-icon"></i>
          <input type="email" id="l-email" placeholder="example@mail.com" autocomplete="email"/>
        </div>
        <div class="field-err" id="l-email-err"></div>
      </div>
 <div class="field">
        <div class="label-row">
          <label>كلمة المرور</label>
          <a href="forgetPassword.html" class="forgot-link" onclick="showForgotPassword()">نسيت كلمة المرور؟</a>
        </div>
        <div class="field-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/>
          <button class="toggle-pass" type="button" onclick="togglePass('l-pass',this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="field-err" id="l-pass-err"></div>
      </div>
      <button class="btn-auth" id="btn-login" onclick="doLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> دخول
      </button>

      <div class="or-divider">أو</div>

      <div class="guest-cta">
        <p>تجربة بدون تسجيل — لديك <strong id="guest-remaining">2</strong> اختيارات مجانية</p>
        <a href="/index.html?mode=guest" class="btn-guest">
          <i class="fa-solid fa-user-secret"></i> دخول كضيف
        </a>
      </div>
    </div>

    <!-- ══ REGISTER FORM ══ -->
    <div class="form-panel" id="panel-reg">
      <div class="field">
        <label>الاسم الكامل</label>
        <div class="field-wrap">
          <i class="fa-regular fa-user field-icon"></i>
          <input type="text" id="r-name" placeholder="اسمك الكريم" autocomplete="name"/>
        </div>
        <div class="field-err" id="r-name-err"></div>
      </div>
      <div class="field">
        <label>اسم المستخدم</label>
        <div class="field-wrap">
          <i class="fa-solid fa-at field-icon"></i>
          <input type="text" id="r-user" placeholder="username" autocomplete="username"/>
        </div>
        <div class="field-err" id="r-user-err"></div>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="field-wrap">
          <i class="fa-regular fa-envelope field-icon"></i>
          <input type="email" id="r-email" placeholder="example@mail.com" autocomplete="email"/>
        </div>
        <div class="field-err" id="r-email-err"></div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="r-pass" placeholder="8 أحرف على الأقل" autocomplete="new-password"
            oninput="checkStrength(this)"/>
          <button class="toggle-pass" type="button" onclick="togglePass('r-pass',this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="pw-strength" id="pw-str">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
          <div class="pw-bar" id="bar4"></div>
        </div>
        <div class="field-err" id="r-pass-err"></div>
      </div>
      <button class="btn-auth" id="btn-reg" onclick="doRegister()">
        <i class="fa-solid fa-user-plus"></i> إنشاء الحساب
      </button>
    </div>

  </div><!-- /auth-body -->
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
