<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مكتبة المعلمين — الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- PingARLT -->
<style>
  @font-face {
    font-family: 'PingARLT';
    src: url('/fonts/PingARLT.woff2') format('woff2'),
         url('/fonts/PingARLT.woff')  format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
</style>

<style>
/* ══════════════════════════════════════
   Light Mode — نفس الألوان الجديدة
══════════════════════════════════════ */
:root {
  --font-main:          'PingARLT', 'Tajawal', sans-serif;

  /* ألوان النظام */
  --color-primary:      #223147;
  --color-primary-dark: #000b21;
  --accent:             #4a74a4;
  --accent-dark:        #223147;
  --accent-hover:       #3a77b0;
  --teal:               #2a7e6e;
  --rose:               #c0705a;

  /* Light surfaces */
  --bg:        #f5f8fc;
  --surface:   #ffffff;
  --surface2:  #eaf0f8;
  --surface3:  #dce8f4;

  /* نصوص */
  --text:      #1a2637;
  --text-sec:  #48576d;
  --muted:     rgba(34,49,71,0.45);

  /* حدود */
  --border:    rgba(74,116,164,0.15);
  --border2:   rgba(74,116,164,0.28);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

/* ── BG ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74,116,164,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(42,126,110,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(74,116,164,0.03) 0%, transparent 60%),
    var(--bg);
}

/* نقاط خلفية خفيفة */
.bg-dots {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(74,116,164,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* Floating orbs */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
  animation: orb-float 12s ease-in-out infinite;
}
.orb1 { width:400px; height:400px; background:rgba(74,116,164,0.07); top:-10%; right:-5%; animation-delay:0s; }
.orb2 { width:300px; height:300px; background:rgba(42,126,110,0.05); bottom:5%; left:-5%; animation-delay:-4s; }
.orb3 { width:200px; height:200px; background:rgba(192,112,90,0.04); bottom:30%; right:10%; animation-delay:-8s; }
@keyframes orb-float {
  0%,100% { transform:translate(0,0) scale(1) }
  33%      { transform:translate(20px,-30px) scale(1.05) }
  66%      { transform:translate(-15px,20px) scale(.96) }
}

/* شريط علوي */
.top-line {
  position: fixed; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent-hover), var(--accent), transparent);
  z-index: 100;
}

/* ── Main Card ── */
.auth-card {
  position: relative; z-index: 10;
  width: 100%; max-width: 440px;
  margin: 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(74,116,164,0.04),
    0 24px 64px rgba(34,49,71,0.12),
    0 4px 16px rgba(34,49,71,0.06);
}

/* Header */
.auth-header {
  padding: 32px 32px 24px;
  text-align: center;
  position: relative;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(74,116,164,0.05) 0%, transparent 100%);
}
.auth-logo {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(74,116,164,0.28);
}
.auth-title {
  font-family: 'Amiri', serif;
  font-size: 26px; font-weight: 700;
  color: var(--accent-dark);
  letter-spacing: .5px; margin-bottom: 6px;
}
.auth-subtitle {
  font-size: 13px; color: var(--text-sec); font-weight: 400;
}

/* زخرفة الأركان */
.corner {
  position: absolute; width: 28px; height: 28px;
  border-color: rgba(74,116,164,0.2); border-style: solid;
}
.corner-tl { top:12px; right:12px; border-width:1.5px 0 0 1.5px; }
.corner-br { bottom:12px; left:12px; border-width:0 1.5px 1.5px 0; }

/* ── Tabs ── */
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.auth-tab {
  flex: 1; padding: 13px;
  text-align: center;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  color: var(--text-sec);
  background: transparent; border: none;
  font-family: var(--font-main);
  position: relative;
  transition: all .2s ease;
}
.auth-tab::after {
  content: ""; position: absolute;
  bottom: 0; left: 15%; right: 15%;
  height: 2.5px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform .25s ease;
}
.auth-tab.on { color: var(--accent); background: var(--surface); }
.auth-tab.on::after { transform: scaleX(1); }
.auth-tab:hover:not(.on) { color: var(--text); background: rgba(74,116,164,0.04); }

/* ── Forms ── */
.auth-body { padding: 26px 30px 30px; }
.form-panel { display: none; }
.form-panel.on { display: block; animation: fadeIn .25s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* label row */
.label-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 7px;
}
.label-row label { margin-bottom: 0 !important; }
.forgot-link {
  font-size: 11px; color: var(--accent); text-decoration: none;
  font-weight: 700; transition: all 0.2s ease;
}
.forgot-link:hover { color: var(--accent-dark); text-decoration: underline; }

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 10px; font-weight: 800;
  color: var(--accent);
  text-transform: uppercase; letter-spacing: .8px;
  margin-bottom: 7px;
}
.field-wrap { position: relative; }
.field-icon {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: rgba(74,116,164,0.35); font-size: 14px; pointer-events: none;
}
.field input {
  width: 100%;
  padding: 11px 40px 11px 14px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  direction: rtl;
}
.field input::placeholder { color: var(--muted); }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(74,116,164,0.1);
  background: var(--surface);
}
.field input.err { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(192,112,90,0.1); }
.field-err { font-size: 11px; color: var(--rose); margin-top: 5px; display: none; }
.field-err.vis { display: block; }

/* ── Submit Btn ── */
.btn-auth {
  width: 100%; padding: 13px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-main);
  font-size: 15px; font-weight: 800;
  border: none; border-radius: 10px;
  cursor: pointer;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 20px rgba(74,116,164,0.28);
  transition: all .2s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 4px;
  border-bottom: 3px solid rgba(0,0,0,0.12);
}
.btn-auth::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
  transform: translateX(-100%); transition: transform .5s;
}
.btn-auth:hover::before { transform: translateX(100%); }
.btn-auth:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(74,116,164,0.38); }
.btn-auth:active { transform: translateY(0); }
.btn-auth:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ── Guest CTA ── */
.guest-cta {
  margin-top: 18px; padding: 14px;
  background: rgba(74,116,164,0.05);
  border: 1px dashed var(--border2);
  border-radius: 10px; text-align: center;
}
.guest-cta p { font-size: 12px; color: var(--text-sec); margin-bottom: 8px; }
.guest-cta strong { color: var(--accent); }
.btn-guest {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px;
  background: transparent;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  color: var(--text-sec);
  font-family: var(--font-main);
  font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .18s ease; text-decoration: none;
}
.btn-guest:hover {
  background: rgba(74,116,164,0.08);
  border-color: var(--accent); color: var(--accent-dark);
}

/* ── Password toggle ── */
.toggle-pass {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(74,116,164,0.35);
  cursor: pointer; font-size: 14px; padding: 4px; transition: color .15s;
}
.toggle-pass:hover { color: var(--accent); }

/* ── Divider ── */
.or-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0;
  font-size: 11px; color: var(--muted);
  font-weight: 600; letter-spacing: .5px;
}
.or-divider::before, .or-divider::after {
  content: ""; flex: 1; height: 1px; background: var(--border);
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  border-right: 3px solid var(--accent);
  font-size: 13px; font-weight: 700;
  z-index: 9999; opacity: 0;
  transition: all .25s ease;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(34,49,71,0.12);
}
#toast.vis { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err { border-right-color: var(--rose); }
#toast.ok  { border-right-color: var(--teal); }

/* Spinner */
.spin {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Password strength */
.pw-strength { display: flex; gap: 4px; margin-top: 6px; }
.pw-bar {
  flex: 1; height: 3px; border-radius: 2px;
  background: var(--border); transition: background .3s;
}
.pw-bar.weak { background: var(--rose); }
.pw-bar.med  { background: var(--accent); }
.pw-bar.str  { background: var(--teal); }
</style>
</head>
<body>

<div class="top-line"></div>
<div class="bg-layer"></div>
<div class="bg-dots"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="auth-card">
  <div class="auth-header">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>
    <div class="auth-logo">✦</div>
    <div class="auth-title">مكتبة المعلمين</div>
    <div class="auth-subtitle">منصة التهاني الإبداعية</div>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab on" id="tab-login" onclick="switchTab('login')">
      <i class="fa-solid fa-right-to-bracket" style="margin-left:6px;font-size:13px"></i>تسجيل الدخول
    </button>
    <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">
      <i class="fa-solid fa-user-plus" style="margin-left:6px;font-size:13px"></i>إنشاء حساب
    </button>
  </div>

  <div class="auth-body">

    <!-- ══ LOGIN FORM ══ -->
    <div class="form-panel on" id="panel-login">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="field-wrap">
          <i class="fa-regular fa-envelope field-icon"></i>
          <input type="email" id="l-email" placeholder="example@mail.com" autocomplete="email"/>
        </div>
        <div class="field-err" id="l-email-err"></div>
      </div>

      <div class="field">
        <div class="label-row">
          <label>كلمة المرور</label>
          <a href="forgetPassword.html" class="forgot-link">نسيت كلمة المرور؟</a>
        </div>
        <div class="field-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/>
          <button class="toggle-pass" type="button" onclick="togglePass('l-pass',this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="field-err" id="l-pass-err"></div>
      </div>

      <button class="btn-auth" id="btn-login" onclick="doLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> دخول
      </button>

      <div class="or-divider">أو</div>

      <div class="guest-cta">
        <a href="/index.html?mode=guest" class="btn-guest">
          <i class="fa-solid fa-user-secret"></i> دخول كضيف
        </a>
      </div>
    </div>

    <!-- ══ REGISTER FORM ══ -->
    <div class="form-panel" id="panel-reg">
      <div class="field">
        <label>الاسم الكامل</label>
        <div class="field-wrap">
          <i class="fa-regular fa-user field-icon"></i>
          <input type="text" id="r-name" placeholder="اسمك الكريم" autocomplete="name"/>
        </div>
        <div class="field-err" id="r-name-err"></div>
      </div>
      <div class="field">
        <label>اسم المستخدم</label>
        <div class="field-wrap">
          <i class="fa-solid fa-at field-icon"></i>
          <input type="text" id="r-user" placeholder="username" autocomplete="username"/>
        </div>
        <div class="field-err" id="r-user-err"></div>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="field-wrap">
          <i class="fa-regular fa-envelope field-icon"></i>
          <input type="email" id="r-email" placeholder="example@mail.com" autocomplete="email"/>
        </div>
        <div class="field-err" id="r-email-err"></div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="r-pass" placeholder="8 أحرف على الأقل" autocomplete="new-password"
            oninput="checkStrength(this)"/>
          <button class="toggle-pass" type="button" onclick="togglePass('r-pass',this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="pw-strength" id="pw-str">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
          <div class="pw-bar" id="bar4"></div>
        </div>
        <div class="field-err" id="r-pass-err"></div>
      </div>
      <button class="btn-auth" id="btn-reg" onclick="doRegister()">
        <i class="fa-solid fa-user-plus"></i> إنشاء الحساب
      </button>
    </div>

  </div><!-- /auth-body -->
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
